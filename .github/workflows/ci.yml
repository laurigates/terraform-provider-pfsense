name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - run: just build

      - run: just vet

      - run: just test

  # Codegen drift gate: regenerating from spec/openapi.json must reproduce the
  # committed provider-code-spec.json and internal/provider/*_gen.go exactly.
  # Catches hand-edits to generated files and spec/config changes committed
  # without regeneration. No live-box access — pure file transformation.
  regenerate-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      # Pinned to the versions the committed output was generated with —
      # a tool upgrade is a deliberate change that regenerates in the same PR.
      - name: Install codegen tools
        run: |
          go install github.com/hashicorp/terraform-plugin-codegen-openapi/cmd/tfplugingen-openapi@v0.3.0
          go install github.com/hashicorp/terraform-plugin-codegen-framework/cmd/tfplugingen-framework@v0.4.1

      - run: just generate

      - name: Verify no codegen drift
        run: git diff --exit-code

  # Docs drift gate: the committed docs/ must match what tfplugindocs renders
  # from the provider schema plus examples/. Catches schema changes and example
  # edits committed without regenerating — the registry serves docs/ verbatim,
  # so drift there ships as wrong documentation.
  docs-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # tools/ is a separate module with its own (newer) Go requirement, so it
      # is the version file for this job — not the provider's go.mod.
      - uses: actions/setup-go@v5
        with:
          go-version-file: tools/go.mod

      - uses: extractions/setup-just@53165ef7e734c5c07cb06b3c8e7b647c5aa16db3 # v4

      - run: just docs

      # `git add -N` stages intent-to-add for untracked files so `git diff`
      # sees them: a newly registered resource yields a brand-new docs page,
      # which a plain `git diff` would silently ignore. tfplugindocs also
      # reformats examples/**/*.tf, so example drift is caught here too.
      - name: Verify no docs drift
        run: |
          git add -N .
          git diff --exit-code
