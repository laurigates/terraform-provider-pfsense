# goreleaser config for a Terraform/OpenTofu provider.
# Mirrors the terraform-provider-scaffolding reference: cross-compiled binaries,
# a SHA256SUMS file signed with GPG, and a registry-compatible archive layout.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    flags:
      - -trimpath
    ldflags:
      - "-s -w -X main.version={{.Version}}"
    goos:
      - linux
      - darwin
      - windows
      - freebsd
    goarch:
      - amd64
      - arm64
      - "386"
      - arm
    ignore:
      - goos: darwin
        goarch: "386"
      - goos: windows
        goarch: arm64
    binary: "{{ .ProjectName }}_v{{ .Version }}"

archives:
  - format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_SHA256SUMS"
  algorithm: sha256
  # The registry manifest must appear in SHA256SUMS (and therefore be covered
  # by the GPG signature below) or the Terraform Registry rejects the release
  # with "Could not find all required assets ... missing SHA256 checksum for
  # manifest.json". release.extra_files below only uploads it to the GitHub
  # release — it does not add it to the checksum file on its own.
  extra_files:
    - glob: "terraform-registry-manifest.json"
      name_template: "{{ .ProjectName }}_{{ .Version }}_manifest.json"

signs:
  - artifacts: checksum
    args:
      # GPG_FINGERPRINT selects the signing key; the key + passphrase are
      # provided by the release workflow (from repo secrets).
      - "--batch"
      - "--local-user"
      - "{{ .Env.GPG_FINGERPRINT }}"
      - "--output"
      - "${signature}"
      - "--detach-sign"
      - "${artifact}"

release:
  draft: false
  extra_files:
    - glob: "terraform-registry-manifest.json"
      name_template: "{{ .ProjectName }}_{{ .Version }}_manifest.json"

changelog:
  disable: true
